name: Linux (x86_64) Build

on:
  workflow_call:
    inputs:
      buildForDistribution:
        description: "Build all four x86 ABI versions"
        required: true
        default: true
        type: boolean
  workflow_dispatch:
    inputs:
      buildForDistribution:
        description: "Build all four x86 ABI versions"
        required: true
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        build_type: [ Debug, Release ]
        include:
          - build_type: Debug
            zip_name: ${{ inputs.buildForDistribution && 'game.linux.x86_64.debug.dist' || 'game.linux.x86_64.debug' }}
          - build_type: Release
            zip_name: ${{ inputs.buildForDistribution && 'game.linux.x86_64.release.dist' || 'game.linux.x86_64.release' }}

    steps:
      - uses: actions/checkout@v5

      - name: Cache Dependencies
        uses: actions/cache@v5
        with:
          path: build-${{ matrix.build_type }}/_deps
          key: ${{ matrix.build_type }}-x86_64-deps-${{ hashFiles('**/.git/HEAD') }}

      - name: Install Packages
        run: |
          sudo apt update
          sudo apt install -y libglew-dev build-essential git make pkg-config cmake ninja-build gnome-desktop-testing \
          libasound2-dev libpulse-dev libaudio-dev libfribidi-dev libjack-dev libsndio-dev libx11-dev libxext-dev \
          libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev libxkbcommon-dev libdrm-dev \
          libgbm-dev libgl1-mesa-dev libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev libthai-dev \
          libpipewire-0.3-dev libwayland-dev libdecor-0-dev liburing-dev libpipewire-0.3-dev libwayland-dev


      - name: Configure CMake
        if: ${{ !inputs.buildForDistribution }}
        run: cmake -B build-${{ matrix.build_type }} -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        if: ${{ !inputs.buildForDistribution }}
        run: cmake --build build-${{ matrix.build_type }} --target launcher -j $(nproc)

      - name: Configure & Build For Distribution
        if: ${{ inputs.buildForDistribution }}
        run: bash BuildForDistribution.sh "build-${{ matrix.build_type }}" ${{ matrix.build_type }}

      - name: Upload results
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.zip_name }}
          path: |
            build-${{ matrix.build_type }}/out/
          retention-days: 90

