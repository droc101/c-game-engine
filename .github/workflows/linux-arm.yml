name: Linux (ARM64) Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    strategy:
      matrix:
        build_type: [ Debug, Release ]
        include:
          - build_type: Debug
            zip_name: game.linux.arm64.debug
          - build_type: Release
            zip_name: game.linux.arm64.release

# TODO: This
#    env:
#      CMAKE_BUILD_PARALLEL_LEVEL: $(nproc)

    steps:
      - uses: actions/checkout@v5

      - name: Cache Dependencies
        uses: actions/cache@v5
        with:
          path: build-${{ matrix.build_type }}/_deps
          key: ${{ matrix.build_type }}-arm64-deps-${{ hashFiles('**/.git/HEAD') }}

      - name: Install Packages
        run: |
          sudo apt update
          sudo apt install -y build-essential git make pkg-config cmake ninja-build gnome-desktop-testing libasound2-dev libpulse-dev libaudio-dev libfribidi-dev libjack-dev libsndio-dev libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev libthai-dev libpipewire-0.3-dev libwayland-dev libdecor-0-dev liburing-dev libcglm-dev libgl-dev libglu-dev

      - name: Configure CMake
        run: cmake -B build-${{ matrix.build_type }} -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build-${{ matrix.build_type }} --target launcher

      - name: Upload results
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.zip_name }}
          path: |
            build-${{ matrix.build_type }}/out/
          retention-days: 90

